# IndOS Mosquitto ACL — per-device topic restrictions
# Each device can only publish to its own telemetry/heartbeat/status topics
# and subscribe to its own cmd/config/ota topics.

# ─── Bridge service account (internal) ──────────────────────────
user indos-bridge
topic readwrite indos/#
topic readwrite $SYS/#

# ─── Pattern-based ACL for devices ──────────────────────────────
# %u = username (device ID)
# Devices can publish to their own telemetry/heartbeat/status:
pattern write indos/devices/%u/telemetry
pattern write indos/devices/%u/heartbeat
pattern write indos/devices/%u/status

# Devices can subscribe to their own cmd/config/ota:
pattern read indos/devices/%u/cmd
pattern read indos/devices/%u/config
pattern read indos/devices/%u/ota

# Devices can subscribe to their own wildcard:
pattern read indos/devices/%u/#
