# IndOS Mosquitto ACL — per-device topic restrictions
# Each device can only publish to its own telemetry/heartbeat/status topics
# and subscribe to its own cmd/config/ota topics.
#
# Phase 14: topics are org-namespaced. A device with orgId "org-acme" uses:
#   indos/org-acme/devices/{username}/telemetry
# A platform device (no orgId) uses the legacy flat space:
#   indos/devices/{username}/telemetry
# The aedes broker enforces this in authorizePublish/authorizeSubscribe (this
# file is the mosquitto equivalent for operators who run mosquitto instead).

# ─── Bridge service account (internal) ──────────────────────────
user indos-bridge
topic readwrite indos/#
topic readwrite $SYS/#

# ─── Pattern-based ACL for devices (org-namespaced) ────────────
# %u = username (device ID). The %u pattern cannot match a path segment that
# contains a slash, so we list BOTH the org-namespaced form (indos/+/devices/...)
# and the legacy platform form (indos/devices/...). The `+` wildcard matches
# exactly one orgId segment.

# Org-scoped device publish (indos/{orgId}/devices/{username}/telemetry)
pattern write indos/+/devices/%u/telemetry
pattern write indos/+/devices/%u/heartbeat
pattern write indos/+/devices/%u/status

# Org-scoped device subscribe
pattern read indos/+/devices/%u/cmd
pattern read indos/+/devices/%u/config
pattern read indos/+/devices/%u/ota
pattern read indos/+/devices/%u/#

# Legacy platform device publish (indos/devices/{username}/telemetry)
pattern write indos/devices/%u/telemetry
pattern write indos/devices/%u/heartbeat
pattern write indos/devices/%u/status

# Legacy platform device subscribe
pattern read indos/devices/%u/cmd
pattern read indos/devices/%u/config
pattern read indos/devices/%u/ota
pattern read indos/devices/%u/#
