# IndOS Mosquitto config (production — auth + ACL)
# Docs: https://mosquitto.org/man/mosquitto-conf-5.html

persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice

# ─── Security: disable anonymous access ─────────────────────────
allow_anonymous false
# Password file (generate with: mosquitto_passwd -c /mosquitto/config/passwd esp32-sensor-01)
# Add more devices: mosquitto_passwd -b /mosquitto/config/passwd <device-id> <password>
password_file /mosquitto/config/passwd

# ACL file: per-device topic restrictions
acl_file /mosquitto/config/acl.conf

# ─── Listener ───────────────────────────────────────────────────
listener 1883
# For TLS (production), uncomment:
# listener 8883
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key
# cafile /mosquitto/certs/ca.crt
# require_certificate true  # mTLS for device auth

# ─── Limits ─────────────────────────────────────────────────────
max_connections 10000
max_inflight_messages 20
max_queued_messages 100
max_keepalive 300
message_size_limit 4096
