# IndOS Mosquitto config (production — dynamic HTTP auth webhook)
#
# ARCHITECTURE: Uses mosquitto-go-auth plugin for HTTP-based dynamic auth.
// Device credentials are validated at runtime via the IndOS webhook API,
// eliminating the need for static password files or ACL files.
//
// PREREQUISITE: Install mosquitto-go-auth plugin
//   Docker: use `iegomez/mosquitto-go-auth` image (includes the plugin)
//   Manual: build from https://github.com/iegomez/mosquitto-go-auth
//
# Docs: https://mosquitto.org/man/mosquitto-conf-5.html
#       https://github.com/iegomez/mosquitto-go-auth

persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice

# ─── Security: disable anonymous access ─────────────────────────
allow_anonymous false

# ─── Dynamic HTTP Auth Webhook (mosquitto-go-auth) ──────────────
# Load the go-auth plugin (path varies by Docker image / install)
auth_plugin /usr/lib/mosquitto/go-auth.so

# Use HTTP backend for both auth and ACL
auth_opt_backends http

# Webhook endpoint — the IndOS Next.js API
# In Docker Compose, use the service name; in production, use the public URL
auth_opt_http_host indos-iot.vercel.app
auth_opt_http_port 443
auth_opt_http_getuser_uri /api/mqtt/auth
auth_opt_http_aclcheck_uri /api/mqtt/auth
auth_opt_http_with_tls true

# Send clientid in auth requests (enables per-device session tracking)
auth_opt_http_send_clientid true

# ─── Listener ───────────────────────────────────────────────────
listener 1883

# For TLS (production), uncomment:
# listener 8883
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key
# cafile /mosquitto/certs/ca.crt
# require_certificate true  # mTLS for device auth (defense in depth)

# ─── Limits ─────────────────────────────────────────────────────
max_connections 10000
max_inflight_messages 20
max_queued_messages 100
max_keepalive 300
message_size_limit 4096

# ─── Topic Isolation (enforced at broker level) ─────────────────
# The webhook denies ALL topics except the device's own namespace:
#   telemetry/{org_id}/{device_id}/#
# Devices can ONLY publish/subscribe within this pattern.
# This is a defense-in-depth layer — the webhook is the primary enforcer.
